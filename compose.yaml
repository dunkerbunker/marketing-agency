services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3007:3007"
    environment:
      NODE_ENV: production
      APP_URL: "${APP_URL:-http://localhost:3007}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3007/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
